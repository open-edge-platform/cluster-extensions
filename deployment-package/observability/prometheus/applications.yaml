---
# prometheus
specSchema: "Application"
schemaVersion: "0.1"
$schema: "https://schema.intel.com/catalog.orchestrator/0.1/schema"

name: prometheus
version: 70.4.3
description: "Prometheus"
kind: extension

# Local fork of kube-prometheus-stack 82.4.0 with patched kube-state-metrics subchart
# kube-state-metrics updated to 7.1.1 to fix kubeRBACProxy probe port issue (upstream PR #6615)
# TODO: Switch back to official repo once the fix is merged and released upstream
# helmRegistry: "prometheus"
# chartName: "kube-prometheus-stack"
helmRegistry: "intel-rs-helm"
chartName: "edge-orch/en/charts/kube-prometheus-stack"
chartVersion: "83.0.0"

profiles:
  - name: default
    displayName: "default"
    valuesFileName: "values-prometheus.yaml"
    deploymentRequirements:
      - name: cert-manager
        version: 0.2.2
        deploymentProfileName: default-profile
