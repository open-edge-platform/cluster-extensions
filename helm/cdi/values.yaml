#  noProxy: http://no-proxy.com:123

kubectl:
  image: alpine/kubectl:1.35.1

extensionImages:
  - quay.io/kubevirt/cdi-operator:v1.64.0
  - quay.io/kubevirt/cdi-controller:v1.64.0
  - quay.io/kubevirt/cdi-importer:v1.64.0
  - quay.io/kubevirt/cdi-cloner:v1.64.0
  - quay.io/kubevirt/cdi-apiserver:v1.64.0
  - quay.io/kubevirt/cdi-uploadserver:v1.64.0
  - quay.io/kubevirt/cdi-uploadproxy:v1.64.0
  - docker.io/library/alpine:3.23.3
  - docker.io/alpine/kubectl:1.35.1
