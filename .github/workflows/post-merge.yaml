name: Post-Merge CI Pipeline

on:
  push:
    branches:
      - main
      - release-*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-merge:
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    uses: open-edge-platform/orch-ci/.github/workflows/post-merge.yml@a95228137803b756aae327668c115db235802982  # 2026.1.3
    with:
      run_version_tag: true
      run_docker_build: true
      run_docker_push: true
      run_build: false
      run_helm_build: true
      run_helm_push: true
      run_artifact_push: true
      trivy_image_skip: |
        ghcr.io/dependabot/dependabot-updater-core:latest,
        ghcr.io/github/github-mcp-server:latest,
        ghcr.io/github/gh-aw-mcpg:latest,
        ghcr.io/github/gh-aw-firewall/agent:latest,
        ghcr.io/github/gh-aw-firewall/api-proxy:latest,
        ghcr.io/github/gh-aw-firewall/squid:latest
      run_version_dev: true
    secrets:
      SYS_EMF_GH_TOKEN: ${{ secrets.SYS_EMF_GH_TOKEN }}
      NO_AUTH_ECR_PUSH_USERNAME: ${{ secrets.NO_AUTH_ECR_PUSH_USERNAME }}
      NO_AUTH_ECR_PUSH_PASSWD: ${{ secrets.NO_AUTH_ECR_PUSH_PASSWD }}
      MSTEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
